<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamFlix</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<header>
  <button id="toggle-favorites-btn">Show Favorites</button>
  <div class="search-genre">
    <input type="text" id="search-bar" placeholder="Search Movies">
    <select id="genre-filter">
      <option value="">All Genres</option>
    </select>
  </div>
</header>

<main>
  <!-- Favorites row -->
  <section id="favorites-container"></section>

  <!-- Movie rows -->
  <section id="movie-container"></section>
</main>

<!-- Modal for movie details -->
<div id="movie-modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <div id="movie-details"></div>
  </div>
</div>

<footer>
  <p>Created by Kevin Ton Le</p>
</footer>

<script src="app.js"></script>
</body>
</html>
