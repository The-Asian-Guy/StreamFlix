<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamFlix</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
  <header>
    <h1>StreamFlix</h1>
    <nav>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Popular</a></li>
      </ul>
    </nav>
    <div class="filters">
      <input type="text" id="search-bar" placeholder="Search Movies">
      <select id="genre-filter">
        <option value="">All Genres</option>
      </select>
    </div>
  </header>

  <main>
    <section id="movie-container">
      
      <!-- Movie List Section -->
      <section id="movie-list" class="movie-grid"></section>
      
      <!-- Pagination Section -->
      <section id="pagination" class="pagination"></section>
      
      <!-- Popular Movies Section -->
      <section id="popular-content">
        <h2>Popular Movies</h2>
        <div id="popular-movie-list" class="movie-grid"></div>
      </section>
      
      <!-- Movie Details Section -->
      <section id="movie-details" class="movie-details"></section>
    </section>
  </main>

  <footer>
    <p>Created by Kevin Ton Le</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
